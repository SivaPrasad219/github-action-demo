name: ci
on:
  push:
    branches:
      - main

jobs:
  my_job:
    name: build
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24.13'
    - name: npm install, build, and test
      run: |
        npm install
        npm run dev
